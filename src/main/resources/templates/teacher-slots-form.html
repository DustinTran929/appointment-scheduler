<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Slot</title>
</head>
<body style="margin:0; background:#f3f4f6; font-family:Arial, sans-serif; min-height:100vh;">

    <div style="max-width:900px; margin:30px auto; padding:0 20px;">

        <div style="background:#1f2937; color:white; padding:16px 20px; margin-bottom:24px; border-radius:12px;">
            <div style="font-size:24px; font-weight:bold;">Appointment Scheduler</div>
            <div style="margin-top:6px; font-size:14px;">
                <strong>Course:</strong> CSCI-P566
                &nbsp; | &nbsp;
                <strong>Project:</strong> Project I
                &nbsp; | &nbsp;
                <strong>User:</strong> <span th:text="${displayName}">Teacher</span>
            </div>
        </div>

        <div style="margin-bottom:24px;">
            <h1 style="margin:0 0 8px 0; font-size:30px; color:#111827;">Create Appointment Slot</h1>
            <p style="margin:0; color:#6b7280;">Create an individual or group appointment slot for a section or specific group.</p>
        </div>

        <div th:if="${error}"
             style="background:#fee2e2; color:#991b1b; padding:12px 14px; border-radius:10px; margin-bottom:18px;">
            <p th:text="${error}" style="margin:0;"></p>
        </div>

        <div style="background:white; padding:28px; border-radius:16px; box-shadow:0 8px 24px rgba(0,0,0,0.08); margin-bottom:24px;">
            <form th:action="@{/teacher/slots}" th:object="${slot}" method="post">

                <div style="margin-bottom:18px;">
                    <label style="display:block; margin-bottom:8px; font-weight:600; color:#374151;">
                        Title
                    </label>
                    <input type="text"
                           th:field="*{title}"
                           style="width:100%; padding:12px 14px; border:1px solid #d1d5db; border-radius:10px; box-sizing:border-box; font-size:15px;" />
                </div>

                <div style="display:grid; grid-template-columns:repeat(auto-fit, minmax(220px, 1fr)); gap:18px; margin-bottom:18px;">
                    <div>
                        <label style="display:block; margin-bottom:8px; font-weight:600; color:#374151;">
                            Type
                        </label>
                        <select th:field="*{type}"
                                style="width:100%; padding:12px 14px; border:1px solid #d1d5db; border-radius:10px; box-sizing:border-box; font-size:15px; background:white;">
                            <option th:each="t : ${types}" th:value="${t}" th:text="${t}"></option>
                        </select>
                    </div>

                    <div>
                        <label style="display:block; margin-bottom:8px; font-weight:600; color:#374151;">
                            Capacity
                        </label>
                        <input type="number"
                               th:field="*{capacity}"
                               min="1"
                               style="width:100%; padding:12px 14px; border:1px solid #d1d5db; border-radius:10px; box-sizing:border-box; font-size:15px;" />
                    </div>
                </div>

                <div style="display:grid; grid-template-columns:repeat(auto-fit, minmax(220px, 1fr)); gap:18px; margin-bottom:18px;">
                    <div>
                        <label style="display:block; margin-bottom:8px; font-weight:600; color:#374151;">
                            Start Time
                        </label>
                        <input type="datetime-local"
                               th:field="*{startTime}"
                               style="width:100%; padding:12px 14px; border:1px solid #d1d5db; border-radius:10px; box-sizing:border-box; font-size:15px;" />
                    </div>

                    <div>
                        <label style="display:block; margin-bottom:8px; font-weight:600; color:#374151;">
                            End Time
                        </label>
                        <input type="datetime-local"
                               th:field="*{endTime}"
                               style="width:100%; padding:12px 14px; border:1px solid #d1d5db; border-radius:10px; box-sizing:border-box; font-size:15px;" />
                    </div>
                </div>

                <div style="margin-bottom:18px;">
                    <label style="display:block; margin-bottom:8px; font-weight:600; color:#374151;">
                        Location
                    </label>
                    <input type="text"
                           th:field="*{location}"
                           style="width:100%; padding:12px 14px; border:1px solid #d1d5db; border-radius:10px; box-sizing:border-box; font-size:15px;" />
                </div>

                <div style="display:grid; grid-template-columns:repeat(auto-fit, minmax(220px, 1fr)); gap:18px; margin-bottom:22px;">
                    <div>
                        <label style="display:block; margin-bottom:8px; font-weight:600; color:#374151;">
                            Section
                        </label>
                        <select name="sectionId"
                                required
                                style="width:100%; padding:12px 14px; border:1px solid #d1d5db; border-radius:10px; box-sizing:border-box; font-size:15px; background:white;">
                            <option value="">-- Select Section --</option>
                            <option th:each="section : ${sections}"
                                    th:value="${section.id}"
                                    th:text="${section.name}">
                            </option>
                        </select>
                    </div>

                    <div>
                        <label style="display:block; margin-bottom:8px; font-weight:600; color:#374151;">
                            Group (optional)
                        </label>
                        <select name="groupId"
                                style="width:100%; padding:12px 14px; border:1px solid #d1d5db; border-radius:10px; box-sizing:border-box; font-size:15px; background:white;">
                            <option value="">-- Entire Section --</option>
                            <option th:each="group : ${groups}"
                                    th:value="${group.id}"
                                    th:text="${group.section.name + ' - ' + group.name}">
                            </option>
                        </select>
                    </div>
                </div>

                <div style="display:flex; gap:12px; flex-wrap:wrap;">
                    <button type="submit"
                            style="background:#1f2937; color:white; border:none; padding:12px 18px; border-radius:10px; font-weight:600; cursor:pointer;">
                        Create Slot
                    </button>

                    <a th:href="@{/teacher/slots}"
                       style="display:inline-block; text-decoration:none; background:#ffffff; color:#111827; border:1px solid #d1d5db; padding:12px 18px; border-radius:10px; font-weight:600;">
                        Back to Teacher Slots
                    </a>
                </div>

            </form>
        </div>

    </div>

</body>
</html>
